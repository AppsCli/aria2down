# Build libaria2 静态库（FFI 默认引擎，ADR-007；唯一本机引擎，ADR-010）。
#
# ADR-010 之前这里还有一组 `*-aria2c` job 单独编译 aria2c 二进制供子进程引擎
# 使用——已经全部移除：本机模式现在固定走 [LibraryDaemon] (FFI 内嵌 libaria2)，
# 外部 aria2c 改由用户自行运行并通过远程 RPC 接入。
name: Build libaria2

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'third_party/aria2/**'
      - 'scripts/build_libaria2_*.sh'
      - 'packages/aria2_native/**'
      - '.github/workflows/build-aria2.yml'

jobs:
  linux-libaria2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool \
            pkg-config libssl-dev zlib1g-dev libsqlite3-dev libc-ares-dev
      - name: Build libaria2
        run: ./scripts/build_libaria2_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: libaria2-linux-x86_64
          path: packages/aria2_native/prebuilt/linux/x86_64/

  macos-libaria2:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build deps
        run: brew install autoconf automake libtool openssl@3 c-ares sqlite3 pkg-config || true
      - name: Build libaria2 universal
        run: ./scripts/build_libaria2_macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: libaria2-macos-universal
          path: packages/aria2_native/prebuilt/macos/universal/

  windows-libaria2:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build libaria2 (mingw, docker)
        run: ./scripts/build_libaria2_windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: libaria2-windows-x86_64
          path: packages/aria2_native/prebuilt/windows/x86_64/

  android-libaria2:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build libaria2 (ndk, docker)
        run: ./scripts/build_libaria2_android.sh
      - uses: actions/upload-artifact@v4
        with:
          name: libaria2-android-abis
          path: packages/aria2_native/prebuilt/android/

  ios-libaria2:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build deps
        run: brew install autoconf automake libtool pkg-config || true
      - name: Build libaria2 (iOS device + sim)
        run: ./scripts/build_libaria2_ios.sh
      - uses: actions/upload-artifact@v4
        with:
          name: libaria2-ios
          path: packages/aria2_native/prebuilt/ios/
