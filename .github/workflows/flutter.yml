name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install aria2 (E2E tests)
        run: sudo apt-get update && sudo apt-get install -y aria2

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Format check
        run: dart format --set-exit-if-changed lib test bin

      - name: Test
        run: flutter test

  # P3-06：验证 Linux 桌面可构建，并把系统 aria2c 拷入 bundle（与 BinaryResolver 同目录策略一致）。
  linux-release-bundle:
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux desktop build deps + aria2
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libayatana-appindicator3-dev aria2 \
            autoconf automake libtool libssl-dev zlib1g-dev libxml2-dev \
            libsqlite3-dev

      - name: Try build aria2c from submodule
        id: build_aria2
        continue-on-error: true
        run: |
          if [[ -f third_party/aria2/configure ]] || [[ -f third_party/aria2/configure.ac ]]; then
            ./scripts/build_aria2.sh
            echo "built=true" >> "$GITHUB_OUTPUT"
          else
            echo "built=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux release
        run: flutter build linux --release

      - name: Stage aria2c into bundle
        id: stage
        run: |
          set -euo pipefail
          BUNDLE="$(find build/linux -path '*/release/bundle' -type d | head -n 1)"
          test -n "${BUNDLE}" && test -d "${BUNDLE}"
          if [[ "${{ steps.build_aria2.outputs.built }}" == "true" ]] && [[ -f third_party/aria2/src/aria2c ]]; then
            SRC="third_party/aria2/src/aria2c"
          else
            SRC="$(command -v aria2c)"
          fi
          test -n "${SRC}" && test -f "${SRC}"
          cp -f "${SRC}" "${BUNDLE}/aria2c"
          chmod +x "${BUNDLE}/aria2c"
          ls -la "${BUNDLE}/aria2c"
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: aria2down-linux-amd64-bundle
          path: ${{ steps.stage.outputs.bundle }}/

  # P3-06：macOS Release 构建（不含签名；供内测 artifact）。
  macos-release-bundle:
    runs-on: macos-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: brew install aria2 autoconf automake libtool openssl@3 || true

      - name: Try build aria2c from submodule
        id: build_aria2_mac
        continue-on-error: true
        run: |
          if [[ -f third_party/aria2/configure ]] || [[ -f third_party/aria2/configure.ac ]]; then
            ./scripts/build_aria2.sh
            echo "built=true" >> "$GITHUB_OUTPUT"
          else
            echo "built=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS release
        run: flutter build macos --release

      - name: Stage aria2c into app bundle (if available)
        id: stage_mac
        run: |
          set -euo pipefail
          APP="$(find build/macos -type d -name '*.app' | grep -i release | head -n 1)"
          test -n "${APP}" && test -d "${APP}/Contents/MacOS"
          if [[ "${{ steps.build_aria2_mac.outputs.built }}" == "true" ]] && [[ -f third_party/aria2/src/aria2c ]]; then
            SRC="third_party/aria2/src/aria2c"
          elif command -v aria2c >/dev/null 2>&1; then
            SRC="$(command -v aria2c)"
          else
            SRC=""
          fi
          if [[ -n "${SRC}" ]]; then
            cp -f "${SRC}" "${APP}/Contents/MacOS/aria2c"
            chmod +x "${APP}/Contents/MacOS/aria2c"
            ls -la "${APP}/Contents/MacOS/aria2c"
          else
            echo "aria2c not found; bundle without embedded binary."
          fi
          echo "app=${APP}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: aria2down-macos-bundle
          path: ${{ steps.stage_mac.outputs.app }}

  windows-release-bundle:
    runs-on: windows-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install aria2 (optional staging)
        run: choco install aria2 -y --no-progress || echo "aria2 not installed via choco"

      - name: Build Windows release
        run: flutter build windows --release

      - name: Stage aria2c into Release
        shell: pwsh
        run: ./scripts/stage_windows_aria2.ps1

      - name: Upload Release folder
        uses: actions/upload-artifact@v4
        with:
          name: aria2down-windows-release
          path: build/windows/x64/runner/Release/

  android-apk:
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: aria2down-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # P4-07：iOS 编译冒烟（无签名、无真机）。
  ios-build-smoke:
    runs-on: macos-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
