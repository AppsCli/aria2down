name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

# ADR-010：本机模式只剩 LibraryDaemon（FFI 内嵌 libaria2）。aria2c 子进程
# 引擎已经从源码、staging 脚本与 CI 流程中整体移除——以下 release-bundle 不
# 再下载 / 编译 / 拷贝 `aria2c` 到产物里，缺 prebuilt libaria2 时 daemon 启动
# 会直接抛错并引导用户改用远程 RPC。
jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Format check
        run: dart format --set-exit-if-changed lib test

      - name: Test
        run: flutter test

  linux-release-bundle:
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libayatana-appindicator3-dev \
            autoconf automake libtool libssl-dev zlib1g-dev libsqlite3-dev \
            libc-ares-dev

      - name: Try build libaria2 (ADR-007 / ADR-010 唯一本机引擎)
        id: build_libaria2
        continue-on-error: true
        run: ./scripts/build_libaria2_linux.sh

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux release
        run: flutter build linux --release

      - name: Locate bundle
        id: stage
        run: |
          set -euo pipefail
          BUNDLE="$(find build/linux -path '*/release/bundle' -type d | head -n 1)"
          test -n "${BUNDLE}" && test -d "${BUNDLE}"
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: aria2down-linux-amd64-bundle
          path: ${{ steps.stage.outputs.bundle }}/

  macos-release-bundle:
    runs-on: macos-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: brew install autoconf automake libtool c-ares sqlite3 pkg-config || true

      - name: Try build libaria2 universal
        id: build_libaria2_mac
        continue-on-error: true
        run: ./scripts/build_libaria2_macos.sh

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS release
        run: flutter build macos --release

      - name: Locate app bundle
        id: stage_mac
        run: |
          set -euo pipefail
          APP="$(find build/macos -type d -name '*.app' | grep -i release | head -n 1)"
          test -n "${APP}" && test -d "${APP}/Contents/MacOS"
          echo "app=${APP}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: aria2down-macos-bundle
          path: ${{ steps.stage_mac.outputs.app }}

  windows-release-bundle:
    runs-on: windows-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Release folder
        uses: actions/upload-artifact@v4
        with:
          name: aria2down-windows-release
          path: build/windows/x64/runner/Release/

  android-apk:
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: aria2down-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # iOS 编译冒烟（无签名、无真机）。
  ios-build-smoke:
    runs-on: macos-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
