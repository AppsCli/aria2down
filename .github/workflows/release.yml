# 手动发版校验与 Linux bundle 构建（不打 tag，维护者本地执行 tag / gh release）。
name: Release prep

on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip Linux bundle build'
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install aria2 (E2E)
        run: sudo apt-get update && sudo apt-get install -y aria2

      - run: ./scripts/validate_release.sh

  linux-bundle:
    if: ${{ inputs.skip_build != true }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libayatana-appindicator3-dev \
            autoconf automake libtool libssl-dev zlib1g-dev \
            libsqlite3-dev libc-ares-dev

      # ADR-010：本机模式只剩 LibraryDaemon（FFI 内嵌 libaria2）。这里先编
      # libaria2 静态库；编不出来时 LibraryDaemon 启动会抛
      # `Aria2NativeUnavailableException`，用户必须改用远程 RPC（设置页有
      # 明确引导）。aria2c 子进程兜底已经从源码与 release 流程整体移除。
      - name: Try build libaria2 (only local engine; ADR-007 / ADR-010)
        id: build_libaria2
        continue-on-error: true
        run: ./scripts/build_libaria2_linux.sh

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-linux-desktop
      - run: flutter build linux --release

      - name: Locate bundle
        id: stage
        run: |
          set -euo pipefail
          BUNDLE="$(find build/linux -path '*/release/bundle' -type d | head -n 1)"
          test -n "${BUNDLE}" && test -d "${BUNDLE}"
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: aria2down-linux-release-prep
          path: ${{ steps.stage.outputs.bundle }}/
