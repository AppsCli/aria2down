# 手动发版校验与 Linux bundle 构建（不打 tag，维护者本地执行 tag / gh release）。
name: Release prep

on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip Linux bundle build'
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install aria2 (E2E)
        run: sudo apt-get update && sudo apt-get install -y aria2

      - run: ./scripts/validate_release.sh

  linux-bundle:
    if: ${{ inputs.skip_build != true }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libayatana-appindicator3-dev aria2 \
            autoconf automake libtool libssl-dev zlib1g-dev libxml2-dev \
            libsqlite3-dev libc-ares-dev

      - name: Try build libaria2 (default engine; ADR-007)
        id: build_libaria2
        continue-on-error: true
        run: ./scripts/build_libaria2_linux.sh

      - name: Try build aria2c subprocess fallback
        id: build_aria2
        continue-on-error: true
        run: |
          if [[ -f third_party/aria2/configure ]] || [[ -f third_party/aria2/configure.ac ]]; then
            ./scripts/build_aria2.sh
            echo "built=true" >> "$GITHUB_OUTPUT"
          else
            echo "built=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-linux-desktop
      - run: flutter build linux --release

      - name: Stage aria2c
        id: stage
        run: |
          set -euo pipefail
          BUNDLE="$(find build/linux -path '*/release/bundle' -type d | head -n 1)"
          test -n "${BUNDLE}" && test -d "${BUNDLE}"
          if [[ "${{ steps.build_aria2.outputs.built }}" == "true" ]] && [[ -f third_party/aria2/src/aria2c ]]; then
            SRC="third_party/aria2/src/aria2c"
          else
            SRC="$(command -v aria2c)"
          fi
          cp -f "${SRC}" "${BUNDLE}/aria2c"
          chmod +x "${BUNDLE}/aria2c"
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: aria2down-linux-release-prep
          path: ${{ steps.stage.outputs.bundle }}/
