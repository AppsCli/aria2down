name: aria2down
description: Cross-platform download client powered by aria2 (Flutter).
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  file_picker: ^8.1.7
  file_selector: ^1.0.3
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  web_socket_channel: ^3.0.1
  open_file: ^3.5.11
  tray_manager: ^0.5.2
  window_manager: ^0.5.1
  launch_at_startup: ^0.3.1
  url_launcher: ^6.3.1
  ffi: ^2.1.0
  app_links: ^6.4.1
  aria2_native:
    path: packages/aria2_native

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  msix: ^3.16.8

# Windows MSIX（P3-05）：在 flutter build windows 后执行 dart run msix:create
msix_config:
  display_name: aria2down
  publisher_display_name: aria2down
  identity_name: cloud.iothub.aria2down
  msix_version: 0.1.0.0
  logo_path: assets/tray/tray.png
  capabilities: internetClient
  # 注册外部唤起协议：自定义 scheme + magnet。Windows 在打包(MSIX)模式下生效。
  protocol_activation: aria2down, magnet
  # 文件关联：双击 .torrent / .metalink / .meta4 唤起本应用预填新建任务。
  file_extension: .torrent, .metalink, .meta4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/tray/tray.png
    - assets/android/README.md
